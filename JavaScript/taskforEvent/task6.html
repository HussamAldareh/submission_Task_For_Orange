<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


<button type="button" id="incr">Incres</button>

<button type="button" id="decr">decres</button>

<p id="p">



</p>



<script>




    let incr=document.getElementById("incr")
    let decr=document.getElementById("decr")
let p =document.getElementById("p")

let count =0
p.textContent=0


function updatecolor() {
  if (count > 0) {
    p.style.color = "green"
  } else if (count < 0) {
    p.style.color = "red"
  } else {
    p.style.color = "black"
  }
}




incr.addEventListener("click",function(){
 count++
p.textContent=count
updatecolor();

})

decr.addEventListener("click",function(){
count--
p.textContent= count    

updatecolor();


})
updatecolor();

</script>

</body>
</html>
