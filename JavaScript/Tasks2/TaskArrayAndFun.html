    for (let i = 0; i < arr.length; i++) {

}

function findMissingNumber(arr) {
    arr.sort((a,b) => a - b);
    for (let i = 1; i <= arr.length+1; i++) {
        if (!arr.includes(i)) {
            return i;
        }
    }
}

function pairSum(arr, target) {
    for (let i = 0; i < arr.length; i++) {
        let complement = target - arr[i];
        if (arr.includes(complement)) {
            return [arr[i], complement];
        }
    }
    return null;
}

console.log(pairSum([2,7,11,15], 9)); 
// [2,7]





function rotateArray(arr, steps) {
    steps = steps % arr.length; // للتأكد ما نتجاوز طول المصفوفة
    return arr.slice(-steps).concat(arr.slice(0, arr.length - steps));
}

console.log(rotateArray([1,2,3,4,5], 2)); 
// [4,5,1,2,3]

function chunkArray(arr,n){

let result = []

for(let i = 0; i < arr.length; i += n){

result.push(arr.slice(i, i + n))

}

return result
}

function groupByLength(arr){

let result = {}

arr.forEach(function(word){

let len = word.length

if(!result[len]){
result[len] = []
}

result[len].push(word)

})

return result
}
