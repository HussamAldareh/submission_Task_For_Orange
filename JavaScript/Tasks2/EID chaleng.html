let arr5=[1,2,3,1,2,3,4,5]
function task5LongSup(arr5) {
    let start = 0;
    let maxLength = 0;
    let bestStart = 0;

    for (let i = 0; i < arr5.length; i++) {

        for (let k = start; k < i; k++) {
            if (arr5[i] === arr5[k]) {
                start = k + 1;
                break;
            }
        }

        let length = i - start + 1;

        if (length > maxLength) {
            maxLength = length;
            bestStart = start;
        }
    }

    let result = [];

    for (let i = bestStart; i < bestStart + maxLength; i++) {
        result.push(arr5[i]);
    }

    return result;
}

console.log(task5LongSup(arr5));

let arr6=[
  [1,2,3],
  [4,5,6],
  [7,8,9]
]


function SpiralMatrixTraversal(arr6){
let res1 = []
let top = 0
let bottom = arr6.length - 1
let left = 0
let right = arr6[0].length - 1

while(top <= bottom && left <= right){

    // ➡️ يمين
    for(let col = left; col <= right; col++){
        res1.push(arr6[top][col])
    }
    top++

    // ⬇️ تحت
    for(let row = top; row <= bottom; row++){
        res1.push(arr6[row][right])
    }
    right--

    // ⬅️ يسار
    if(top <= bottom){
        for(let col = right; col >= left; col--){
            res1.push(arr6[bottom][col])
        }
        bottom--
    }

    // ⬆️ فوق
    if(left <= right){
        for(let row = bottom; row >= top; row--){
            res1.push(arr6[row][left])
        }
        left++
    }
}
console.log(res1)
}
SpiralMatrixTraversal(arr6)
