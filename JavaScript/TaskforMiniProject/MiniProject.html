<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
}

/* 🔥 slider */
.swiper {
  width: 90%;
  margin: 50px auto;
}

.user-card1 {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  
}

.user-card1 img {
  width: 100%;
  border-radius: 10px;
}

/* 🔥 grid تحت */
#Dir {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  width: 90%;
  margin: 30px auto;
}

.user-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.user-card img {
  width: 100px;
  border-radius: 50%;
}

/* hover بسيط */
.user-card:hover,
.user-card1:hover {
  transform: translateY(-5px);
  transition: 0.3s;
}
</style>
</head>

<body>
<div style="margin: auto;">
<!-- 🔥 slider -->
 <div style="background-color: blue; ">
  <h3 style="text-align: center; color: white;">Feturd User </h3>
<div class="swiper">
  <div class="swiper-wrapper" id="users"></div>

  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-pagination"></div>
</div>
</div>
<!-- 🔥 directory -->
<div id="container" >
  <h2 style="text-align:center;">User Directory</h2>
<div class="card">
<input type="search" id="search" placeholder="Search by name... " style=" width: 500px; margin-left: 70px;" > <button type="button" class="btn btn-info"  style="background-color: cornflowerblue; color: white;">Search</button>
</div>
  <div id="Dir"></div>
</div>
</div>
<script>
  let alluser = [];
const users = document.getElementById("users");
const dir = document.getElementById("Dir");
let search=document.getElementById("search");
fetch("https://jsonplaceholder.typicode.com/users")
  .then(res => res.json())
  .then(data => {
    localStorage.setItem("users", JSON.stringify(data));

        let dat = localStorage.getItem("users");


    alluser=data
    data.slice(0,4).forEach(user => {

      // 🔥 slider
      let slide = document.createElement("div");
      slide.className = "swiper-slide user-card1";

      slide.innerHTML = `
        <img src="https://robohash.org/${user.id}?set=set2">
        <h3>${user.name}</h3>
        <p>${user.company.name}</p>
      `;

      users.appendChild(slide);

      // 🔥 grid تحت
      let card = document.createElement("div");
      card.className = "user-card";

      card.innerHTML = `
        <img src="https://robohash.org/${user.id}?set=set2">
        <h3>${user.name}</h3>
        <h4>${user.username}</h4>
        <hr>
        <p>${user.email}</p>
                <hr>
        <p>${user.address.city}</p>
      <hr>
         <p>${user.company.name}</p>



        `;

      dir.appendChild(card);
    });



search.addEventListener("input", function (e) {
  let value = search.value.toLowerCase();
  let filtered = alluser.filter(user =>
    user.name.toLowerCase().includes(value)
  );
  dir.innerHTML = "";
  if(filtered.length===0){
    dir.innerHTML="<p style='text-align:center; color: red;'>No users found</p>"
    return
  }


filtered.slice(0,4).forEach(user => {
      let card = document.createElement("div");
      card.className = "user-card";

      card.innerHTML = `
        <img src="https://robohash.org/${user.id}?set=set2">${user.name}
        <hr>
        <p>${user.email}</p>
                <hr>
        <p>${user.address.city}</p>
      <hr>
         <p>${user.company.name}</p>

        `;

      dir.appendChild(card);
    });



})



})




    // 🔥 مهم: بعد الإضافة
    new Swiper('.swiper', {
      slidesPerView: 3,
      spaceBetween: 20,
      loop: true,

      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },

      pagination: {
        el: '.swiper-pagination',
        clickable: true,
      },
    });



    if (!sessionStorage.getItem("isActive")) {
  alert("Session started");
}
sessionStorage.setItem("isActive", "true");

</script>

</body>
</html>
