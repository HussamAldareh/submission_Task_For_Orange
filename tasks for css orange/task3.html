<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>

.container {
  background-color: #E3E2FF;
  width: 800px;
  margin: 50px auto;
  padding: 20px;
}

.form1 {
  display: grid;
  grid-template-columns: 1fr 1fr; 
  gap: 10px;
  width: auto;
  background-color: #8886C7;
}

.form1 h3 {
  grid-column: span 2; 
}

.full {
  grid-column: span 2; 
}

input {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
}
.checkbox-row {
  display: flex;
  align-items: start;
  gap: 8px;
  font-size: 12px;
  
}

</style>
</head>

<body>

<div class="container">
  <form class="form1">
    
    <h3>Sign Up</h3>

    <div>
      <input type="text" placeholder="First Name">
    </div>

    <div>
      <input type="text" placeholder="Last Name">
    </div>

    <div class="full">
      <input type="email" placeholder="Email">
    </div>

    <div class="full">
      <input type="password" placeholder="Password">
    </div>

    <div class="full">
      <input type="password" placeholder="Confirm Password">
    </div>

 <div class="full checkbox-row">
  <input type="checkbox" id="agree">
  <label for="agree" style="margin-right:200px ; width: auto; height: auto;">I accept the terms of use and privacy policy</label>
</div>
<div>
        <button type="button" class="Button" style="background-color:darkgrey; color: grey; border: none; display: block; margin-left: 50%; width: 100%; height: 30px; margin-top: 20px; border-radius: 9px; "> Login</button>

</div>

<div style="display: block;">

<a href="#" style="text-decoration: none; display: block; text-align: center; margin-top: 100px; color: white; margin-right: 350px;"> <h6>Already have an account? Login Herer </h6> </a>

</div>
<h5 style="text-align: center ;margin-left: 350px;">CopyRight @Hussam </h5>

  </form>


</div>




</body>
</html>
